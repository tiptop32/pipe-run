services:
  qa-pipe:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./allure_reports:/app/allure_reports
      - ./config.json:/app/config.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
