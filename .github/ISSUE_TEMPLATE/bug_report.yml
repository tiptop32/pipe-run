name: Bug Report
description: Report a reproducible bug
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to report a bug!"

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: QA Pipe version / Docker image tag
      placeholder: "e.g. 0.1.0 or latest"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: shell
